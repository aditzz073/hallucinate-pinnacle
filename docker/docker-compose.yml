services:
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: pinnacle_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pinnacle_secure_pass_2026}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    image: hallucinate-pinnacle-backend:latest
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ../backend:/app/backend
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload
    environment:
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_TO_A_SECURE_RANDOM_STRING_IN_PRODUCTION_MIN_32_CHARS}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MONGODB_USER: pinnacle_admin
      MONGODB_PASSWORD: ${MONGO_PASSWORD:-pinnacle_secure_pass_2026}
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DB: pinnacle
    env_file:
      - ../backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    image: hallucinate-pinnacle-frontend:latest
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  mongo_data:
